# PowerSync Sync Rules — bucket definitions per docs/TECH_STACK.md "Sample Sync Rules".
#
# M0 ships an empty scaffold. Each domain milestone appends the buckets for the tables it owns
# (M2 reference: products + services; M3+ doctor_scope: assigned customers, pets, ledgers, visits,
# field inventory, etc.) so the mobile client can pull rows the moment a milestone lands.

bucket_definitions:

  # M2 — Reference data, same for every field doctor (pull-only on the client).
  # Writes happen through /admin/products and /admin/services; the device cannot mutate this bucket.
  reference:
    data:
      - SELECT * FROM products WHERE deleted_at IS NULL
      - SELECT * FROM services WHERE deleted_at IS NULL

  # M3 — Doctor scope: each field doctor's assigned customers, their pets, their ledger, and
  # all of that ledger's entries. PRD §8.6: filtering is purely server-side via these rules; the
  # client schema does not change. Parameter expansion follows the parent FK chain so a customer
  # joining the scope brings its pets, ledger, and ledger_entries with it.
  doctor_scope:
    parameters: SELECT id AS doctor_id FROM users WHERE id = request.user_id()

    data:
      - SELECT * FROM customers
        WHERE assigned_doctor_id = bucket.doctor_id
          AND deleted_at IS NULL
      - SELECT pets.* FROM pets
        JOIN customers ON pets.customer_id = customers.id
        WHERE customers.assigned_doctor_id = bucket.doctor_id
          AND pets.deleted_at IS NULL
      - SELECT ledgers.* FROM ledgers
        JOIN customers ON ledgers.customer_id = customers.id
        WHERE customers.assigned_doctor_id = bucket.doctor_id
          AND ledgers.deleted_at IS NULL
      - SELECT ledger_entries.* FROM ledger_entries
        JOIN ledgers ON ledger_entries.ledger_id = ledgers.id
        JOIN customers ON ledgers.customer_id = customers.id
        WHERE customers.assigned_doctor_id = bucket.doctor_id
          AND ledger_entries.deleted_at IS NULL

      # M4 — field inventory scope: the doctor's own field inventory ("moving warehouse"), its
      # materialized stock balances, and every movement that touches it. stock_items and
      # inventory_movements join field_inventories on location_id so only the doctor's 'field'
      # location reaches the device (PRD §8.6). Warehouse stock/movements stay server-only.
      - SELECT * FROM field_inventories
        WHERE doctor_id = bucket.doctor_id
          AND deleted_at IS NULL
      - SELECT stock_items.* FROM stock_items
        JOIN field_inventories ON stock_items.location_id = field_inventories.id
        WHERE stock_items.location_type = 'field'
          AND field_inventories.doctor_id = bucket.doctor_id
          AND stock_items.deleted_at IS NULL
      - SELECT inventory_movements.* FROM inventory_movements
        JOIN field_inventories ON inventory_movements.from_location_id = field_inventories.id
        WHERE inventory_movements.from_location_type = 'field'
          AND field_inventories.doctor_id = bucket.doctor_id
          AND inventory_movements.deleted_at IS NULL
      - SELECT inventory_movements.* FROM inventory_movements
        JOIN field_inventories ON inventory_movements.to_location_id = field_inventories.id
        WHERE inventory_movements.to_location_type = 'field'
          AND field_inventories.doctor_id = bucket.doctor_id
          AND inventory_movements.deleted_at IS NULL

      # M5 — visits the doctor ran, plus their clinical child records (procedures, prescriptions,
      # follow-ups, vaccinations, attachments) by the visit FK chain. The device upload connector
      # writes these back through the .NET /sync/* endpoints, where the field-visit conflict rule
      # and inventory invariants are enforced.
      #
      # 6-month "hot window" (PRD §8.6): PowerSync Sync Rules are static and cannot express a
      # self-advancing relative window (a row synced today would never auto-evict as the clock
      # moves). The window is therefore a CLIENT concern: the mobile app passes a `visits_hot_since`
      # connection parameter (recomputed to ~6 months ago on each connect) and trims older rows
      # locally; older records are fetched on-demand when opened online. When the client sends that
      # parameter, add it to this bucket's parameter query (token-trusted doctor_id stays separate)
      # and append `AND visits.started_at >= bucket.visits_hot_since` to the visits query below.
      - SELECT visits.* FROM visits
        WHERE visits.doctor_id = bucket.doctor_id
          AND visits.deleted_at IS NULL
      - SELECT procedures.* FROM procedures
        JOIN visits ON procedures.visit_id = visits.id
        WHERE visits.doctor_id = bucket.doctor_id
          AND procedures.deleted_at IS NULL
      - SELECT prescriptions.* FROM prescriptions
        JOIN visits ON prescriptions.visit_id = visits.id
        WHERE visits.doctor_id = bucket.doctor_id
          AND prescriptions.deleted_at IS NULL
      - SELECT daily_follow_ups.* FROM daily_follow_ups
        JOIN visits ON daily_follow_ups.visit_id = visits.id
        WHERE visits.doctor_id = bucket.doctor_id
          AND daily_follow_ups.deleted_at IS NULL
      - SELECT attachments.* FROM attachments
        JOIN visits ON attachments.visit_id = visits.id
        WHERE visits.doctor_id = bucket.doctor_id
          AND attachments.deleted_at IS NULL
      # Visit-linked vaccinations…
      - SELECT vaccinations.* FROM vaccinations
        JOIN visits ON vaccinations.visit_id = visits.id
        WHERE visits.doctor_id = bucket.doctor_id
          AND vaccinations.deleted_at IS NULL
      # …plus standalone pet vaccinations for the doctor's assigned customers (no visit_id),
      # so the next-due schedule is available on-device regardless of visit recency.
      - SELECT vaccinations.* FROM vaccinations
        JOIN pets ON vaccinations.pet_id = pets.id
        JOIN customers ON pets.customer_id = customers.id
        WHERE customers.assigned_doctor_id = bucket.doctor_id
          AND vaccinations.deleted_at IS NULL

      # M6 — the doctor's appointment calendar, filtered on doctor_id like visits. The device
      # books / reschedules / cancels through /sync/appointments, where doctor double-booking
      # detection runs server-side; marking attendance is online-only (it opens a clinic visit).
      - SELECT appointments.* FROM appointments
        WHERE appointments.doctor_id = bucket.doctor_id
          AND appointments.deleted_at IS NULL

      # M7 — financial: invoices for the doctor's assigned customers (and any field invoice tied to
      # one of the doctor's own visits), their line items + payments by the invoice FK chain, and the
      # customers' receipt vouchers. Filtered through the customer assigned_doctor_id / visit doctor_id
      # chains, mirroring the ledger scope. The device issues these through
      # /sync/{invoices,invoice_items,payments,receipt_vouchers}, which are append-only and
      # server-authoritative — financial conflicts always defer to the server (SCHEMA invariant #5).
      - SELECT invoices.* FROM invoices
        JOIN customers ON invoices.customer_id = customers.id
        WHERE customers.assigned_doctor_id = bucket.doctor_id
          AND invoices.deleted_at IS NULL
      - SELECT invoices.* FROM invoices
        JOIN visits ON invoices.visit_id = visits.id
        WHERE visits.doctor_id = bucket.doctor_id
          AND invoices.deleted_at IS NULL
      - SELECT invoice_items.* FROM invoice_items
        JOIN invoices ON invoice_items.invoice_id = invoices.id
        JOIN customers ON invoices.customer_id = customers.id
        WHERE customers.assigned_doctor_id = bucket.doctor_id
          AND invoice_items.deleted_at IS NULL
      - SELECT invoice_items.* FROM invoice_items
        JOIN invoices ON invoice_items.invoice_id = invoices.id
        JOIN visits ON invoices.visit_id = visits.id
        WHERE visits.doctor_id = bucket.doctor_id
          AND invoice_items.deleted_at IS NULL
      - SELECT payments.* FROM payments
        JOIN invoices ON payments.invoice_id = invoices.id
        JOIN customers ON invoices.customer_id = customers.id
        WHERE customers.assigned_doctor_id = bucket.doctor_id
          AND payments.deleted_at IS NULL
      - SELECT payments.* FROM payments
        JOIN invoices ON payments.invoice_id = invoices.id
        JOIN visits ON invoices.visit_id = visits.id
        WHERE visits.doctor_id = bucket.doctor_id
          AND payments.deleted_at IS NULL
      - SELECT receipt_vouchers.* FROM receipt_vouchers
        JOIN customers ON receipt_vouchers.customer_id = customers.id
        WHERE customers.assigned_doctor_id = bucket.doctor_id
          AND receipt_vouchers.deleted_at IS NULL
