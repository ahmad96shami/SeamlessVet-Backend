# Local development stack — see vet-backend/CLAUDE.md "Local dev URLs" for ports.
#
# Postgres is started with wal_level=logical so the PowerSync Service can attach
# its replication slot against the `powersync` publication created by db-init/00-publication.sql.
# Sync-bucket storage uses the same Postgres (no Mongo needed, per docs/TECH_STACK.md).

services:
  postgres:
    image: postgres:17-alpine
    container_name: vet-postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_DB: vet
      POSTGRES_USER: vet
      POSTGRES_PASSWORD: ${PG_PASSWORD:-vet_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vet -d vet"]
      interval: 5s
      timeout: 5s
      retries: 10

  powersync:
    image: journeyapps/powersync-service:1.21.0
    container_name: vet-powersync
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      PS_PG_URI: postgresql://vet:${PG_PASSWORD:-vet_dev_password}@postgres:5432/vet
      PS_API_JWKS_URI: ${PS_API_JWKS_URI:-http://host.docker.internal:5180/.well-known/jwks.json}
      PS_DEV_TOKEN_FALLBACK: ""
      # Point the runner at the config via env var. NOT `-config`: the runner's commander parser reads
      # single-dash `-config` as `-c onfig` and drops the path (SSL on this hop is off via config.yaml).
      POWERSYNC_CONFIG_PATH: /config/config.yaml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./powersync/config.yaml:/config/config.yaml:ro
      - ./powersync/sync-rules.yaml:/config/sync-rules.yaml:ro
    command: ["start"]

  seq:
    image: datalust/seq:latest
    container_name: vet-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"
    volumes:
      - seqdata:/data

volumes:
  pgdata:
  seqdata:
