# PowerSync Sync Rules — bucket definitions per docs/TECH_STACK.md "Sample Sync Rules".
#
# M0 ships an empty scaffold. Each domain milestone appends the buckets for the tables it owns
# (M2 reference: products + services; M3+ doctor_scope: assigned customers, pets, ledgers, visits,
# field inventory, etc.) so the mobile client can pull rows the moment a milestone lands.

bucket_definitions:

  # M2 — Reference data, same for every field doctor (pull-only on the client).
  # Writes happen through /admin/products and /admin/services; the device cannot mutate this bucket.
  reference:
    data:
      - SELECT * FROM products WHERE deleted_at IS NULL
      - SELECT * FROM services WHERE deleted_at IS NULL

  # M3 — Doctor scope: each field doctor's assigned customers, their pets, their ledger, and
  # all of that ledger's entries. PRD §8.6: filtering is purely server-side via these rules; the
  # client schema does not change. Parameter expansion follows the parent FK chain so a customer
  # joining the scope brings its pets, ledger, and ledger_entries with it.
  doctor_scope:
    parameters: SELECT id AS doctor_id FROM users WHERE id = request.user_id()

    data:
      - SELECT * FROM customers
        WHERE assigned_doctor_id = bucket.doctor_id
          AND deleted_at IS NULL
      - SELECT pets.* FROM pets
        JOIN customers ON pets.customer_id = customers.id
        WHERE customers.assigned_doctor_id = bucket.doctor_id
          AND pets.deleted_at IS NULL
      - SELECT ledgers.* FROM ledgers
        JOIN customers ON ledgers.customer_id = customers.id
        WHERE customers.assigned_doctor_id = bucket.doctor_id
          AND ledgers.deleted_at IS NULL
      - SELECT ledger_entries.* FROM ledger_entries
        JOIN ledgers ON ledger_entries.ledger_id = ledgers.id
        JOIN customers ON ledgers.customer_id = customers.id
        WHERE customers.assigned_doctor_id = bucket.doctor_id
          AND ledger_entries.deleted_at IS NULL

      # M4 — field inventory scope: the doctor's own field inventory ("moving warehouse"), its
      # materialized stock balances, and every movement that touches it. stock_items and
      # inventory_movements join field_inventories on location_id so only the doctor's 'field'
      # location reaches the device (PRD §8.6). Warehouse stock/movements stay server-only.
      - SELECT * FROM field_inventories
        WHERE doctor_id = bucket.doctor_id
          AND deleted_at IS NULL
      - SELECT stock_items.* FROM stock_items
        JOIN field_inventories ON stock_items.location_id = field_inventories.id
        WHERE stock_items.location_type = 'field'
          AND field_inventories.doctor_id = bucket.doctor_id
          AND stock_items.deleted_at IS NULL
      - SELECT inventory_movements.* FROM inventory_movements
        JOIN field_inventories ON inventory_movements.from_location_id = field_inventories.id
        WHERE inventory_movements.from_location_type = 'field'
          AND field_inventories.doctor_id = bucket.doctor_id
          AND inventory_movements.deleted_at IS NULL
      - SELECT inventory_movements.* FROM inventory_movements
        JOIN field_inventories ON inventory_movements.to_location_id = field_inventories.id
        WHERE inventory_movements.to_location_type = 'field'
          AND field_inventories.doctor_id = bucket.doctor_id
          AND inventory_movements.deleted_at IS NULL
