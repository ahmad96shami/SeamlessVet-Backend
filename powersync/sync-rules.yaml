# PowerSync Sync Rules — per-doctor read scope (PRD §8.6), Sync Streams syntax.
#
# Each stream is `auto_subscribe: true`, so the client just `connect()`s and the streams flow
# without explicit `syncStream().subscribe()` calls. The legacy `bucket_definitions:` form was
# replaced with `streams:` to unblock Mo3 — SDK 1.35 + server 1.10.2 in legacy mode never
# streamed data to the on-device SQLite (the SDK now expects stream metadata the legacy
# protocol doesn't carry). Server image is bumped to 1.21.0 alongside this change.
#
# Parent→child scoping is expressed inline with subqueries against `auth.user_id()`
# (the new namespace replacing legacy `request.user_id()` for streams). Tables 2+ levels
# below the doctor (ledger_entries → ledger → customer; invoice_items/payments → invoice →
# customer/visit; vaccinations → pet → customer) carry a denormalized scope key
# (`customer_id` / `visit_id`) maintained by a BEFORE INSERT/UPDATE trigger — see
# migration M14_SyncScopeDenormalization. The key is derived from the immutable parent FK,
# so a customer reassignment moves the whole subtree automatically and a client can't forge
# its scope.
#
# `invoices`, `invoice_items`, `payments` and `vaccinations` appear in BOTH `by_customer`
# and `by_visit` on purpose: a field invoice may belong to a customer assigned to a different
# doctor (the field doctor still owes/owns the visit and its money trail). Streams dedupe
# overlapping rows so the duplicate query is safe.
#
# Writes still flow through the .NET `/sync/*` endpoints — this file governs the
# read/download path only. Every query excludes soft-deleted rows.

config:
  # Edition 3 enables the new Sync Streams compiler — required for top-level `with:` CTEs and
  # per-stream `queries:` (multi-query) on PowerSync 1.21.0. Without it, the YAML validates as
  # alpha-streams and `queries:` / `with:` are rejected.
  edition: 3

with:
  # Shared CTEs — the doctor's scope anchors, reused across multiple streams. Top-level
  # `with:` makes these available to every stream.
  my_customers: SELECT id AS customer_id FROM customers WHERE assigned_doctor_id = auth.user_id() AND deleted_at IS NULL
  # M16 — farm ledgers are owned by `farm_id` with `customer_id` NULL (ck_ledgers_owner), so the
  # `ledgers WHERE customer_id IN my_customers` query below can never match them; this CTE lets
  # the by_customer stream reach them through the farm's owning customer (Mo8 per-farm balances).
  # NOTE: the customers filter is inlined — a CTE referencing another CTE (`… IN (SELECT
  # customer_id FROM my_customers)`) compiles but evaluates to an empty set on 1.21.0.
  my_farms: SELECT id AS farm_id FROM farms WHERE customer_id IN (SELECT id FROM customers WHERE assigned_doctor_id = auth.user_id() AND deleted_at IS NULL) AND deleted_at IS NULL
  my_visits: SELECT id AS visit_id FROM visits WHERE doctor_id = auth.user_id() AND deleted_at IS NULL
  my_field_inventories: SELECT id AS field_inventory_id FROM field_inventories WHERE doctor_id = auth.user_id() AND deleted_at IS NULL
  my_contracts: SELECT id AS contract_id FROM contracts WHERE responsible_doctor_id = auth.user_id() AND deleted_at IS NULL

streams:

  # --- Reference data: identical for every field doctor, pull-only on the client (M2). -----
  reference:
    auto_subscribe: true
    queries:
      - SELECT * FROM products WHERE deleted_at IS NULL
      - SELECT * FROM services WHERE deleted_at IS NULL

  # --- Entities owned directly by the doctor. ----------------------------------------------
  doctor_owned:
    auto_subscribe: true
    queries:
      - SELECT * FROM customers WHERE assigned_doctor_id = auth.user_id() AND deleted_at IS NULL
      - SELECT * FROM visits WHERE doctor_id = auth.user_id() AND deleted_at IS NULL
      - SELECT * FROM field_inventories WHERE doctor_id = auth.user_id() AND deleted_at IS NULL
      - SELECT * FROM appointments WHERE doctor_id = auth.user_id() AND deleted_at IS NULL
      - SELECT * FROM contracts WHERE responsible_doctor_id = auth.user_id() AND deleted_at IS NULL
      - SELECT * FROM batches WHERE responsible_doctor_id = auth.user_id() AND deleted_at IS NULL
      - SELECT * FROM doctor_entitlements WHERE doctor_id = auth.user_id() AND deleted_at IS NULL

  # --- Everything hanging off the doctor's assigned customers. -----------------------------
  # ledger_entries / invoice_items / payments / vaccinations reach `customer_id` via the
  # denormalized scope key (trigger-maintained); the rest have a native `customer_id`.
  by_customer:
    auto_subscribe: true
    queries:
      - SELECT * FROM pets             WHERE customer_id IN (SELECT customer_id FROM my_customers) AND deleted_at IS NULL
      - SELECT * FROM farms            WHERE customer_id IN (SELECT customer_id FROM my_customers) AND deleted_at IS NULL
      - SELECT * FROM ledgers          WHERE customer_id IN (SELECT customer_id FROM my_customers) AND deleted_at IS NULL
      - SELECT * FROM ledgers          WHERE farm_id     IN (SELECT farm_id     FROM my_farms)     AND deleted_at IS NULL
      - SELECT * FROM ledger_entries   WHERE customer_id IN (SELECT customer_id FROM my_customers) AND deleted_at IS NULL
      - SELECT * FROM receipt_vouchers WHERE customer_id IN (SELECT customer_id FROM my_customers) AND deleted_at IS NULL
      - SELECT * FROM invoices         WHERE customer_id IN (SELECT customer_id FROM my_customers) AND deleted_at IS NULL
      - SELECT * FROM invoice_items    WHERE customer_id IN (SELECT customer_id FROM my_customers) AND deleted_at IS NULL
      - SELECT * FROM payments         WHERE customer_id IN (SELECT customer_id FROM my_customers) AND deleted_at IS NULL
      - SELECT * FROM vaccinations     WHERE customer_id IN (SELECT customer_id FROM my_customers) AND deleted_at IS NULL

  # --- Clinical + financial children of the doctor's own visits. ---------------------------
  # invoice_items / payments / vaccinations reach `visit_id` via the denormalized scope key.
  # (A 6-month hot window can be added later by filtering visits.started_at — PRD §8.6.)
  by_visit:
    auto_subscribe: true
    queries:
      - SELECT * FROM procedures       WHERE visit_id IN (SELECT visit_id FROM my_visits) AND deleted_at IS NULL
      - SELECT * FROM prescriptions    WHERE visit_id IN (SELECT visit_id FROM my_visits) AND deleted_at IS NULL
      - SELECT * FROM daily_follow_ups WHERE visit_id IN (SELECT visit_id FROM my_visits) AND deleted_at IS NULL
      - SELECT * FROM night_stays      WHERE visit_id IN (SELECT visit_id FROM my_visits) AND deleted_at IS NULL
      - SELECT * FROM attachments      WHERE visit_id IN (SELECT visit_id FROM my_visits) AND deleted_at IS NULL
      - SELECT * FROM vaccinations     WHERE visit_id IN (SELECT visit_id FROM my_visits) AND deleted_at IS NULL
      - SELECT * FROM invoices         WHERE visit_id IN (SELECT visit_id FROM my_visits) AND deleted_at IS NULL
      - SELECT * FROM invoice_items    WHERE visit_id IN (SELECT visit_id FROM my_visits) AND deleted_at IS NULL
      - SELECT * FROM payments         WHERE visit_id IN (SELECT visit_id FROM my_visits) AND deleted_at IS NULL

  # --- The doctor's field inventory ("moving warehouse"): balances + lots + movements. -----
  # stock_items / inventory_lots / inventory_movements join the inventory by `location_id`;
  # warehouse stock (and its lots) stays server-only. M25 — the FEFO lots that back the field
  # balance sync too, so the device can show cost/expiry and reconcile Σ remaining_qty.
  by_field_inventory:
    auto_subscribe: true
    queries:
      - SELECT * FROM stock_items          WHERE location_id      IN (SELECT field_inventory_id FROM my_field_inventories) AND location_type      = 'field' AND deleted_at IS NULL
      - SELECT * FROM inventory_lots        WHERE location_id      IN (SELECT field_inventory_id FROM my_field_inventories) AND location_type      = 'field' AND deleted_at IS NULL
      - SELECT * FROM inventory_movements  WHERE from_location_id IN (SELECT field_inventory_id FROM my_field_inventories) AND from_location_type = 'field' AND deleted_at IS NULL
      - SELECT * FROM inventory_movements  WHERE to_location_id   IN (SELECT field_inventory_id FROM my_field_inventories) AND to_location_type   = 'field' AND deleted_at IS NULL

  # --- Farm coverage for the doctor's contracts (M29 removed per-medication price overrides). --
  by_contract:
    auto_subscribe: true
    queries:
      - SELECT * FROM contract_farms WHERE contract_id IN (SELECT contract_id FROM my_contracts) AND deleted_at IS NULL
